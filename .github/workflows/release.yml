name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Raven
        uses: martian56/setup-raven@v1

      - name: Build
        run: rvpm build

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p release
          tar -czf "release/rook-${version}-${{ matrix.target }}.tar.gz" -C target/raven-out rook

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME".TrimStart("v")
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path target/raven-out/rook.exe -DestinationPath "release/rook-$version-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: rook-${{ matrix.target }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "rook $GITHUB_REF_NAME" \
            --generate-notes \
            artifacts/*/*
